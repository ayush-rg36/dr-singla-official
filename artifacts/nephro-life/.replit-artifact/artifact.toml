kind = "web"
previewPath = "/"
title = "NephroLife - Nephrology Clinic"
version = "1.0.0"
id = "artifacts/nephro-life"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18661

[services.development]
run = "pnpm --filter @workspace/nephro-life run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nephro-life", "run", "build" ]
publicDir = "artifacts/nephro-life/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18661"
BASE_PATH = "/"
